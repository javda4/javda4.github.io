<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FaceMesh Stable Split</title>

<style>
body {
  margin: 0;
  display: flex;
  overflow: hidden;
  background: black;
}

/* LEFT SIDE */
#left {
  width: 50vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* IMPORTANT: NO COVER CROPPING */
#video {
  position: absolute;
  width: 100%;
  height: 100%;

  object-fit: fill; /* 🔥 FIX: removes iPhone scaling drift */
  transform: scaleX(-1);
}

#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* RIGHT SIDE */
#right {
  width: 50vw;
  height: 100vh;
  background: #050505;
}

#canvas3d {
  width: 100%;
  height: 100%;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
}
</style>
</head>

<body>

<div id="debug">starting...</div>

<div id="left">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="right">
  <canvas id="canvas3d"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="app.js"></script>

</body>
</html>
