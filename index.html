<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Face Mapping CDN Build</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      width: 220px;
      bottom: 10px;
      left: 10px;
      transform: scaleX(-1);
      border: 2px solid lime;
      border-radius: 10px;
      z-index: 10;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- Three.js -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<!-- App -->
<script src="app.js"></script>

</body>
</html>
