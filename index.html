<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Computer Vision Demo Suite</title>

<style>

body{
  margin:0;
  display:flex;
  overflow:hidden;
  background:black;
}

/* LEFT SIDE */
#left{
  width:50vw;
  height:100vh;
  position:relative;
  overflow:hidden;
}

#video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:fill;
  transform:scaleX(-1);
}

#overlay{
  position:absolute;
  width:100%;
  height:100%;
}

/* RIGHT SIDE */
#right{
  width:50vw;
  height:100vh;
  background:#050505;
}

#canvas3d{
  width:100%;
  height:100%;
}

#debug{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-family:monospace;
}

#switchDemo{
  position:fixed;
  top:10px;
  right:10px;
  z-index:10;
  padding:10px 16px;
  background:white;
  border:none;
  cursor:pointer;
}

</style>
</head>

<body>

<div id="debug">loading...</div>
<button id="switchDemo">Switch Demo</button>

<div id="left">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<div id="right">
  <canvas id="canvas3d"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="facemesh.js"></script>
<script src="slam.js"></script>
<script src="app.js"></script>

</body>
</html>
