<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Face Mapping Web</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    video {
      position: absolute;
      width: 200px;
      bottom: 10px;
      left: 10px;
      transform: scaleX(-1);
      border: 2px solid #00ff00;
      border-radius: 8px;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<!-- Three.js (LOCAL) -->
<script src="./assets/three.min.js"></script>

<!-- App -->
<script type="module" src="app.js"></script>

</body>
</html>
