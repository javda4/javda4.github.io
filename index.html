<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>DEBUG CAMERA + WEBGL</title>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }

    /* CAMERA LAYER (FORCED FRONT) */
    video {
      position: fixed;
      width: 300px;
      bottom: 10px;
      left: 10px;
      border: 3px solid lime;
      z-index: 9999;
      background: black;
    }

    /* CANVAS BACKGROUND */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1;
    }

    /* DEBUG TEXT */
    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      color: white;
      z-index: 10000;
      font-family: monospace;
    }
  </style>
</head>

<body>

<div id="debug">loading...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="app.js"></script>

</body>
</html>
