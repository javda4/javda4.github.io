<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Face Tracking Debug</title>

<style>
body{
margin:0;
background:black;
font-family:monospace;
}

#cameraBox{
position:fixed;
bottom:10px;
left:10px;
width:400px;
height:300px;
}

#video{
position:absolute;
width:100%;
height:100%;
border:3px solid lime;
}

#overlay{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

#viewer3d{
position:fixed;
right:0;
top:0;
width:50vw;
height:100vh;
background:#111;
}

#debug{
position:fixed;
top:10px;
left:10px;
color:white;
font-size:18px;
}
</style>

</head>

<body>

<div id="debug">starting...</div>

<div id="cameraBox">
<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>
</div>

<div id="viewer3d"></div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script src="app.js"></script>

</body>
</html>
