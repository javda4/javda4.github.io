<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FaceMesh Working (iPhone Fixed)</title>

<style>
body {
  margin: 0;
  background: black;
  overflow: hidden;
}

/* camera + overlay MUST match exactly */
#video, #overlay {
  position: fixed;
  bottom: 10px;
  left: 10px;

  width: 400px;
  height: 300px;

  object-fit: cover;
  border: 3px solid lime;
}

/* overlay sits on top */
#overlay {
  pointer-events: none;
  z-index: 2;
}

/* video behind */
#video {
  z-index: 1;
}

/* debug text */
#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
  z-index: 10;
}
</style>
</head>

<body>

<div id="debug">starting...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="app.js"></script>

</body>
</html>
