<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Face Mapping Fix</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    /* CAMERA LAYER */
    video {
      position: fixed;
      width: 240px;
      bottom: 10px;
      left: 10px;
      transform: scaleX(-1);
      border: 2px solid lime;
      border-radius: 10px;
      z-index: 10;
      background: black;
    }

    /* THREE.JS LAYER */
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: 1;
    }
  </style>
</head>

<body>

<video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="app.js"></script>

</body>
</html>
