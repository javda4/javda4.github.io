<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Face Landmark Overlay</title>

<style>
body{
  margin:0;
  background:black;
}

/* camera feed */
video{
  width:400px;
  position:fixed;
  bottom:10px;
  left:10px;
  border:3px solid lime;
  z-index:1;
}

/* drawing overlay */
canvas{
  position:fixed;
  bottom:10px;
  left:10px;
  z-index:2;
  pointer-events:none;
}

/* debug text */
#debug{
  position:fixed;
  top:10px;
  left:10px;
  color:white;
  font-family:monospace;
  font-size:16px;
  z-index:10;
}
</style>

</head>

<body>

<div id="debug">starting...</div>

<video id="video" autoplay playsinline muted></video>
<canvas id="overlay"></canvas>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.js"></script>
<script src="app.js"></script>

</body>
</html>
