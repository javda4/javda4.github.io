<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FaceMesh 2D + 3D Split Stable</title>
  
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  display: flex;
}

/* ---------------- LEFT SIDE ---------------- */
#left {
  width: 50vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* video fills container */
#video {
  position: absolute;
  width: 100%;
  height: 100%;

  object-fit: cover;
  transform: scaleX(-1);
}

/* overlay matches EXACT display size */
#overlay {
  position: absolute;
  width: 100%;
  height: 100%;

  left: 0;
  top: 0;

  pointer-events: none;
}

/* ---------------- RIGHT SIDE ---------------- */
#right {
  width: 50vw;
  height: 100vh;
  background: #050505;
  display: flex;
  align-items: center;
  justify-content: center;
}

#canvas3d {
  width: 100%;
  height: 100%;
}

/* ---------------- DEBUG ---------------- */
#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  color: white;
  font-family: monospace;
  z-index: 10;
}
</style>
</head>

<body>

<div id="debug">starting...</div>

<!-- LEFT -->
<div id="left">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="overlay"></canvas>
</div>

<!-- RIGHT -->
<div id="right">
  <canvas id="canvas3d"></canvas>
</div>

<!-- MEDIAPIPE -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="app.js"></script>

</body>
</html>
